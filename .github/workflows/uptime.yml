name: uptime

on:
  schedule:
    - cron: "*/10 * * * *"   # check toutes les 10 min
    - cron: "17 3 1 * *"     # keepalive mensuel (anti-desactivation 60 j)
  workflow_dispatch:

permissions:
  contents: write   # etat (fichier state) + keepalive

concurrency:
  group: uptime
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check https://regimevault.com/api/health
        id: check
        run: |
          status=down
          for i in 1 2 3; do
            body=$(curl -fsS --max-time 20 https://regimevault.com/api/health || true)
            if echo "$body" | grep -q '"ok"'; then
              status=up
              break
            fi
            echo "attempt $i failed (body: ${body:0:100})"
            sleep 30
          done
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "site status: $status"

      - name: Load previous state
        id: prev
        run: |
          prev=$(cat state 2>/dev/null || echo "up")
          echo "prev=$prev" >> "$GITHUB_OUTPUT"
          echo "previous status: $prev"

      - name: Alert Telegram on transition
        if: steps.check.outputs.status != steps.prev.outputs.prev
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ "${{ steps.check.outputs.status }}" = "down" ]; then
            msg="🔴 regimevault.com DOWN : /api/health ne repond plus (3 tentatives depuis GitHub Actions). Verifier le VPS."
          else
            msg="🟢 regimevault.com UP : /api/health repond de nouveau."
          fi
          curl -fsS "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="$msg" > /dev/null
          echo "telegram alert sent (${{ steps.check.outputs.status }})"

      - name: Save state (commit on transition)
        if: steps.check.outputs.status != steps.prev.outputs.prev
        run: |
          echo "${{ steps.check.outputs.status }}" > state
          git config user.name "rv-uptime-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state
          git commit -m "state: ${{ steps.prev.outputs.prev }} -> ${{ steps.check.outputs.status }}"
          git push

      - name: Keepalive (monthly empty commit)
        if: github.event.schedule == '17 3 1 * *'
        run: |
          git config user.name "rv-uptime-bot"
          git config user.email "actions@users.noreply.github.com"
          git commit --allow-empty -m "keepalive: prevent scheduled workflow auto-disable"
          git push
